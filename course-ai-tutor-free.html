<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Tutor - BrandMark Digital Marketing Course</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: linear-gradient(135deg, #0a0a0a 0%, #1f1f1f 100%);
            color: #fff;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
        }

        header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            color: #FF6B35;
        }

        .language-selector {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .lang-btn {
            padding: 12px 24px;
            border: 2px solid #FF6B35;
            background: transparent;
            color: #FF6B35;
            cursor: pointer;
            border-radius: 8px;
            font-weight: 600;
            transition: all 0.3s ease;
            font-size: 14px;
        }

        .lang-btn:hover {
            background: #FF6B35;
            color: #0a0a0a;
        }

        .lang-btn.active {
            background: #FF6B35;
            color: #0a0a0a;
        }

        .tutor-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        .video-container {
            background: linear-gradient(135deg, #1f1f1f 0%, #2a2a2a 100%);
            border-radius: 12px;
            padding: 40px;
            text-align: center;
            border: 2px solid #FF6B35;
            min-height: 400px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }

        .video-container .icon {
            font-size: 80px;
            margin-bottom: 20px;
        }

        .video-container p {
            font-size: 18px;
            color: #aaa;
        }

        .chat-container {
            background: linear-gradient(135deg, #1f1f1f 0%, #2a2a2a 100%);
            border-radius: 12px;
            border: 2px solid #FF6B35;
            display: flex;
            flex-direction: column;
            min-height: 400px;
        }

        .chat-header {
            padding: 20px;
            border-bottom: 1px solid #FF6B35;
            font-weight: 600;
            font-size: 16px;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .message {
            padding: 15px;
            border-radius: 8px;
            max-width: 85%;
            word-wrap: break-word;
        }

        .user-message {
            background: #FF6B35;
            color: #0a0a0a;
            align-self: flex-end;
            border-radius: 8px 2px 8px 8px;
        }

        .bot-message {
            background: #3b82f6;
            color: #fff;
            align-self: flex-start;
            border-radius: 2px 8px 8px 8px;
        }

        .thinking {
            display: flex;
            gap: 4px;
            padding: 15px;
        }

        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #FF6B35;
            animation: bounce 1.4s infinite;
        }

        .dot:nth-child(2) {
            animation-delay: 0.2s;
        }

        .dot:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes bounce {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-10px); }
        }

        .chat-input-area {
            display: flex;
            gap: 10px;
            padding: 20px;
            border-top: 1px solid #FF6B35;
        }

        .chat-input-area input {
            flex: 1;
            padding: 12px 16px;
            background: #0a0a0a;
            border: 1px solid #FF6B35;
            color: #fff;
            border-radius: 8px;
            font-family: 'Outfit', sans-serif;
            font-size: 14px;
        }

        .chat-input-area input::placeholder {
            color: #666;
        }

        .chat-input-area button {
            padding: 12px 20px;
            background: #FF6B35;
            color: #0a0a0a;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .chat-input-area button:hover {
            background: #ff8553;
            transform: translateY(-2px);
        }

        .voice-btn {
            background: #3b82f6;
        }

        .voice-btn:hover {
            background: #2563eb;
        }

        @media (max-width: 768px) {
            .tutor-grid {
                grid-template-columns: 1fr;
            }

            header h1 {
                font-size: 1.8em;
            }

            .message {
                max-width: 95%;
            }
        }

        .loading {
            opacity: 0.6;
        }

        .error-message {
            background: #dc2626;
            color: #fff;
            padding: 15px;
            border-radius: 8px;
            margin: 10px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🤖 AI Course Tutor</h1>
            <p>Learn Digital Marketing with AI (100% Free)</p>
        </header>

        <!-- Language Selector -->
        <div class="language-selector">
            <button class="lang-btn active" onclick="setLanguage('en')">🇬🇧 English</button>
            <button class="lang-btn" onclick="setLanguage('hi')">🇮🇳 हिंदी</button>
            <button class="lang-btn" onclick="setLanguage('ar')">🇸🇦 العربية</button>
        </div>

        <div class="tutor-grid">
            <!-- Video Section -->
            <div class="video-container">
                <div class="icon">🎓</div>
                <p>AI Tutor Ready to Help<br>Ask me about Digital Marketing!</p>
            </div>

            <!-- Chat Section -->
            <div class="chat-container">
                <div class="chat-header">💬 Chat with AI Tutor</div>
                <div class="chat-messages" id="chatMessages"></div>
                <div class="chat-input-area">
                    <input 
                        type="text" 
                        id="userInput" 
                        placeholder="Ask your question..." 
                        onkeypress="if(event.key==='Enter') sendMessage()"
                    />
                    <button onclick="sendMessage()" title="Send Message">
                        <i class="fas fa-paper-plane"></i>
                    </button>
                    <button class="voice-btn" onclick="startVoiceInput()" title="Voice Input">
                        <i class="fas fa-microphone"></i>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentLanguage = 'en';
        let isLoading = false;

        const greetings = {
            'en': 'Hello! I am your AI tutor. I can help you learn about Digital Marketing. What would you like to know?',
            'hi': 'नमस्ते! मैं आपका AI ट्यूटर हूँ। मैं आपको डिजिटल मार्केटिंग सीखने में मदद कर सकता हूँ। आप क्या जानना चाहते हैं?',
            'ar': 'مرحبا! أنا معلمك الذكي. يمكنني مساعدتك على تعلم التسويق الرقمي. ماذا تريد أن تعرف؟'
        };

        const placeholders = {
            'en': 'Ask your question...',
            'hi': 'अपना प्रश्न पूछें...',
            'ar': 'اسأل سؤالك...'
        };

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            addMessage('bot', greetings[currentLanguage]);
        });

        function setLanguage(lang) {
            currentLanguage = lang;
            document.querySelectorAll('.lang-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
            
            // Clear and reinitialize chat
            document.getElementById('chatMessages').innerHTML = '';
            document.getElementById('userInput').placeholder = placeholders[lang];
            addMessage('bot', greetings[lang]);
        }

        function addMessage(sender, text) {
            const messagesDiv = document.getElementById('chatMessages');
            const messageEl = document.createElement('div');
            messageEl.className = `message ${sender}-message`;
            messageEl.textContent = text;
            messagesDiv.appendChild(messageEl);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        function addThinkingIndicator() {
            const messagesDiv = document.getElementById('chatMessages');
            const thinkingEl = document.createElement('div');
            thinkingEl.className = 'thinking';
            thinkingEl.id = 'thinking-indicator';
            thinkingEl.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>';
            messagesDiv.appendChild(thinkingEl);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        function removeThinkingIndicator() {
            const thinking = document.getElementById('thinking-indicator');
            if (thinking) thinking.remove();
        }

        async function sendMessage() {
            if (isLoading) return;

            const input = document.getElementById('userInput');
            const question = input.value.trim();

            if (!question) return;

            addMessage('user', question);
            input.value = '';
            isLoading = true;
            addThinkingIndicator();

            try {
                const response = await fetch('/api/ai-tutor', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        question: question,
                        language: currentLanguage
                    })
                });

                if (!response.ok) throw new Error('API Error');

                const data = await response.json();
                removeThinkingIndicator();
                addMessage('bot', data.answer);

                // Generate speech
                await generateSpeech(data.answer);
            } catch (error) {
                removeThinkingIndicator();
                addMessage('bot', 'Sorry, I encountered an error. Please try again.');
                console.error(error);
            } finally {
                isLoading = false;
            }
        }

        async function generateSpeech(text) {
            try {
                const response = await fetch('/api/generate-voice', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        text: text,
                        language: currentLanguage
                    })
                });

                if (response.ok) {
                    const audioBlob = await response.blob();
                    const audioUrl = URL.createObjectURL(audioBlob);
                    const audio = new Audio(audioUrl);
                    audio.play().catch(e => console.log('Audio play failed:', e));
                }
            } catch (error) {
                console.log('Voice generation skipped');
            }
        }

        function startVoiceInput() {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRecognition) {
                alert('Speech Recognition not supported in your browser');
                return;
            }

            const recognition = new SpeechRecognition();
            recognition.language = currentLanguage === 'hi' ? 'hi-IN' : 
                                   currentLanguage === 'ar' ? 'ar-SA' : 'en-US';
            
            recognition.onstart = () => {
                console.log('Listening...');
            };

            recognition.onresult = (event) => {
                const transcript = Array.from(event.results)
                    .map(result => result[0].transcript)
                    .join('');
                document.getElementById('userInput').value = transcript;
            };

            recognition.onerror = (error) => {
                console.log('Speech error:', error);
            };

            recognition.start();
        }
    </script>
</body>
</html>
